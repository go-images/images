name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Track the latest stable Go (org convention). go.mod floor is 1.26.4.
jobs:
  # Build, vet, race-test, and enforce 100% statement coverage on three OSes.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go version
      - run: go vet ./...
      - run: go build ./...
      - name: Test + 100% coverage gate
        shell: bash
        run: |
          COVERPKG=$(go list ./... | paste -sd, -)
          go test -race -coverpkg="$COVERPKG" -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -n 25
          cov=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "coverage: ${cov}%"
          awk -v t="$cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::coverage ${cov}% < 100%"; exit 1; }

  # Run the suite on the six supported 64-bit targets. amd64/arm64 run natively;
  # the rest run under qemu-user. This is the per-arch SIMD execution gate: it
  # validates the go-asmgen SIMD kernels (amd64 SSE2, arm64 NEON) bit-for-bit
  # against their scalar oracles where they ship, and the scalar+multicore
  # fallback on loong64/ppc64le/riscv64/s390x — each kernels test logs which
  # path (HaveSIMD / SIMDName) it exercised on that target.
  arch-native:
    name: arch ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: amd64 }
          - { os: ubuntu-24.04-arm, label: arm64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go env GOARCH && go test ./...

  arch-qemu:
    name: arch ${{ matrix.goarch }} (qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: riscv64, qemu: qemu-riscv64-static }
          - { goarch: loong64, qemu: qemu-loongarch64-static }
          - { goarch: ppc64le, qemu: qemu-ppc64le-static }
          - { goarch: s390x,   qemu: qemu-s390x-static }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Test under qemu (${{ matrix.goarch }})
        run: GOARCH=${{ matrix.goarch }} go test -exec=${{ matrix.qemu }} ./...

  # Verify the committed go-asmgen output (simd_{amd64,arm64}.s) is in sync with
  # its generator: regenerate from gen.go and fail if the working tree differs,
  # so the hand-checked SIMD assembly can never silently drift from its source.
  asmgen-sync:
    name: asmgen .s in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Regenerate SIMD assembly
        # Each gen.go is build-tag 'ignore' and pulls go-asmgen only at generate
        # time (via -mod=mod), so the library keeps a zero-dependency go.mod. The
        # generators are run directly (not via `go generate`, whose directives
        # live in arch-gated files) so all targets regenerate on this one host.
        # go.mod/go.sum are restored afterwards; only the .s is checked.
        run: |
          for a in amd64 arm64 s390x; do
            ( cd internal/kernels/asmgen/$a && GOWORK=off GOFLAGS=-mod=mod go run gen.go && mv simd_$a.s ../../ )
          done
          git checkout -- go.mod
          rm -f go.sum
      - name: Fail if generated .s drifted
        run: |
          if ! git diff --exit-code -- internal/kernels/'*.s'; then
            echo "::error::committed SIMD .s is out of sync with gen.go — run 'go generate ./internal/kernels/...'"
            exit 1
          fi
